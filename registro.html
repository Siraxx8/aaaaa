<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiCRM - Registro</title>
</head>
<body>
    <main class="register-container">
        <section class="register-card">
                <header>
                    <h1>MiCRM</h1>
                    <p>Registrarse</p>
                    <form action="#" method="POST">
                        
                        <div class="form-usuario">
                            <label for="title">Nombre</label>
                            <input type="text" name="Nombre" id="Nombre" required  >
                        </div>
                        <div class="form-usuario">
                            <label for="title">Cédula</label>
                            <input type="tel" name="Cedula" id="Cedula" required >
                        </div>
                        <div class="form-usuario">
                            <label for="title">Correo Eléctronico</label>
                            <input type="email" name="Correo" id="Correo" required >
                        </div>
                        <div class="form-usuario">
                            <label for="">Teléfono</label>
                            <input type="tel" name="Telefono" id="Telefono" required >
                        </div>
                        <div class="form-usuario">
                            <label for="title">Dirección</label>
                            <input type="text" name="Dirección" id="Dirección" required >
                        </div>
                        <div class="form-usuario">
                            <label for="title">Tipo de Cliente</label>
                            <input type="text" name="Cliente" id="Cliente" required >
                        </div>
                    </form>

                </header>




        </section>
    </main>
</body>
</html>
