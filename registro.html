<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiCRM - Registro</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <main class="register-container">
        <section class="register-card">
                <header>
                    <h1><strong>MiCRM </strong></h1>
                    <p>Registrarse</p>
                </header>
                    <form action="#" method="POST">
                        
                        <div class="form-group">
                            <label for="title">Nombre</label>
                            <input type="text" name="Nombre" id="Nombre" pattern="[A-Za-záéíóúñÑ]+" placeholder="ej. Jose Sira" required>
                        </div>
                        <div class="form-group">
                            <label for="title">Cédula</label>
                            <input type="tel" name="Cedula" id="Cedula" required minlength="7" maxlength="9" placeholder="Minimo 8-10 caracteres" >
                        </div>
                        <div class="form-group">
                            <label for="title">Correo Eléctronico</label>
                            <input type="email" name="Correo" id="Correo" required placeholder="ejemplo@gmail.com">
                        </div>
                        <div class="form-group">
                            <label for="">Teléfono</label>
                            <input type="tel" name="Telefono" id="Telefono" required pattern="11" placeholder="Numero de Telefono">
                        </div>
                        <div class="form-group">
                            <label for="title">Dirección</label>
                            <input type="text" name="Dirección" id="Dirección" pattern="[A-Za-záéíóúñÑ]+" placeholder="ej.Pueblo nuevo" required  >
                        <div>
                            <input type="radio" name="Persona" id="Persona">

                        </div>
                    </form>

        </section>
    </main>
</body>
</html>
