<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiCRM - Registro</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <main class="register-container">
        <section class="register-card">
            <header>
                <!--ENCABEZADO DE EL SITIO WEB-->
                <h1><strong>MiCRM </strong></h1>
                <p>Registrarse</p>
            </header>
            
            <form action="#" method="POST">
                <fieldset>
                    <legend>DATOS PERSONALES</legend>
                    <!--Espacio de nombre completo del usuario-->
                    <nav>
                    <div class="form-group">
                        <label for="Nombre">Nombre</label>
                        
                        <input type="text" name="Nombre" id="Nombre" pattern="[A-Za-záéíóúñÑ\s]+" placeholder="ej. Jose Sira" required>
                    </div>
                    <!--Espacio de Cedula-->
                    <div class="form-group">
                        <label for="Cedula">Cédula</label>
                        <input type="tel" name="Cedula" id="Cedula" required minlength="7" maxlength="9" placeholder="ej. 26123456">
                    </div>
                    <!--Espacio de Correo electronico-->
                    <div class="form-group">
                        <label for="Correo">Correo Electrónico</label>
                        <input type="email" name="Correo" id="Correo" required placeholder="ejemplo@gmail.com">
                    </div>
                    <!--Espacio de Telefono-->
                    <div class="form-group">
                        <label for="Telefono">Teléfono</label>
                        
                        <input type="tel" name="Telefono" id="Telefono" required pattern="\d{11}" placeholder="04121234567">
                    </div>
                    <!--Espacio de Direccion-->
                    <div class="form-group">
                        <label for="Direccion">Dirección</label>
                        <input type="text" name="Direccion" id="Direccion" pattern="[A-Za-záéíóúñÑ0-9\s]+" placeholder="ej. Pueblo nuevo" required>
                    </div>
                    </nav>

                    <!--Seleccion de tipo de cliente (juridico o natural)-->
                    <div class="form-group">
                        <fieldset>
                            <legend>Tipo de cliente</legend>
                            <label for="Natural">
                                <input type="radio" name="Natuyjuri" id="Natural" value="Natural" checked> Natural
                            </label><br>
                            
                            <label for="Juridico">
                                <input type="radio" name="Natuyjuri" id="Juridico" value="Juridico"> Juridico
                            </label>
                        </fieldset>
                    </div>

                    <!--Seleccionador de sector e industria-->
                    <div class="form-group">
                        <label for="sectorindus">Sector/Industria</label>
                        <select name="sectorindus" id="sectorindus" required>
                            <option value="#">Selecciona...</option>
                            <option value="tecnologia">Tecnologia</option>
                            <option value="comercio">Comercio</option>
                            <option value="salud">Salud</option>
                            <option value="educacion">Educacion</option>
                        </select>
                    </div>
                </fieldset>
            </form>

            <footer>
                <!--Enlace para redirigirse al login-->
                <a href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
            </footer>
            <!--Boton de registrar-->
            <button type="submit">Registrar</button>
        </section>
    </main>
</body>
</html>
